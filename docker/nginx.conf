server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    access_log /var/log/nginx/epay.access.log;
    error_log  /var/log/nginx/epay.error.log;

    # ── 安全：禁止访问敏感目录 ──
    location ^~ /plugins/   { deny all; }
    location ^~ /includes/  { deny all; }
    location ^~ /install/   { deny all; }
    location ^~ /docker/    { deny all; }
    location ~* \.(sql|log|bak|lock)$ { deny all; }
    location ~ /\. { deny all; }

    # ── 伪静态规则 ──
    location / {
        if (!-e $request_filename) {
            rewrite ^/(.[a-zA-Z0-9\-\_]+)\.html$ /index.php?mod=$1 last;
        }
        rewrite ^/pay/(.*)$ /pay.php?s=$1 last;
        rewrite ^/api/(.*)$ /api.php?s=$1 last;
        rewrite ^/doc/(.[a-zA-Z0-9\-\_]+)\.html$ /index.php?doc=$1 last;
    }

    # ── PHP-FPM ──
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # ── 静态资源缓存 ──
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 安全头 ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10m;
}
