services:
  epay:
    build: .
    container_name: epay-miuix
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - epay-data:/var/www/html/includes
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: epay-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: change_me_root_pwd
      MYSQL_DATABASE: epay
      MYSQL_USER: epay
      MYSQL_PASSWORD: change_me_epay_pwd
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pchange_me_root_pwd"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  epay-data:
  mysql-data:
